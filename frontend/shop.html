<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Techtronic</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="header"><div class="container header-main"><a class="logo" href="index.html">TECH<span>TRONIC</span><small>Electronic Commerce</small></a><form class="search-form" action="shop.html"><input name="search" placeholder="Type here"><button>Search</button></form><div class="header-actions"><a class="cart-link" href="cart.html" title="Cart">&#128722;<span class="cart-count" data-cart-count>0</span></a><div class="account-actions" data-auth-area></div></div></div></header>
  <nav class="nav"><div class="container nav-bar"><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="cart.html">Cart</a></div></nav>

  <section class="section">
    <div class="container">
      <div class="section-title">
        <h1>SHOP ELECTRONICS</h1>
        <p>Find smart phones, laptops, watches, audio devices, and accessories.</p>
      </div>
      <form class="filters" id="filtersForm">
        <input name="search" placeholder="Search products">
        <select name="category" id="categorySelect"><option value="">All categories</option></select>
        <select name="sort">
          <option value="newest">Newest</option>
          <option value="priceLow">Price: low to high</option>
          <option value="priceHigh">Price: high to low</option>
          <option value="name">Name</option>
        </select>
        <button class="primary-btn">Apply</button>
      </form>
      <div class="product-grid" id="productsGrid"></div>
      <p id="emptyMessage" class="panel" style="display:none;text-align:center;">No products found.</p>
    </div>
  </section>

  <footer class="footer"><div class="container footer-grid"><div><h2>TECHTRONIC</h2><p>Electronics for every setup.</p></div><div><h3>Shop</h3><p><a href="shop.html">All Products</a></p></div><div><h3>Account</h3><p><a href="login.html">Login</a></p></div></div></footer>
  <script src="js/config.js"></script><script src="js/demo-data.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/cart.js"></script><script src="js/render.js"></script><script src="js/shop.js"></script>
  <script src="js/techbot-widget.js"></script>
</body>
</html>
